name: CI

# Feature-Branches laufen bewusst ohne CI — dort ist `ci-local` das Sicherheitsnetz.
# Das Gate sind Pull Requests und main.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    # Öffentliches Repo ⇒ GitHub-Runner. Self-hosted Runner sind hier tabu: ein Fork-PR
    # würde fremden Workflow-Code auf eigener Hardware ausführen.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Die Ränder, die pyproject zusagt: min, prod (Panel-Image), max.
        python: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python }}

      # Der Klassifizierer und die Tests sind stdlib-only — nichts zu installieren.
      - name: Suite (Fach + Hygiene)
        run: ./scripts/check.sh

      - name: Wiederholbarkeit — dieselbe Suite ein zweites Mal
        run: ./scripts/check.sh

      # Dieselbe Prüfung, die der pre-push-Hook fährt.
      - name: Arbeitsverzeichnis ist unverändert geblieben
        run: ./scripts/_residue_check.sh check

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Panel-Image bauen (nicht veröffentlichen)
        run: docker build -t paperlaiss-panel:ci ./panel

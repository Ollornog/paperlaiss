name: Release

# Ein Tag löst aus. Die Reihenfolge ist Absicht: erst prüfen, dann testen, dann bauen,
# dann veröffentlichen. Ein Release mit falscher Nummer ist schlimmer als keins —
# es ist unauffällig falsch. Veröffentlicht wird das Panel-Image; der Klassifizierer
# selbst ist eine stdlib-only Datei, die man einhängt, kein Abbild.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Tag gegen die Paketversion prüfen
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          echo "Tag $TAG, pyproject $PKG"
          [ "$TAG" = "$PKG" ] || { echo "Tag und Paketversion laufen auseinander"; exit 1; }
          grep -q "## \[$PKG\]" CHANGELOG.md || { echo "CHANGELOG kennt $PKG nicht"; exit 1; }

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Suite fahren, bevor irgendetwas veröffentlicht wird
        run: ./scripts/check.sh

      - name: Registry-Namen kleinschreiben
        # github.repository_owner liefert die Schreibweise des Kontos; buildx verlangt
        # Kleinbuchstaben und bricht sonst ab — bei grünem Job und fehlendem Abbild.
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Panel-Abbild bauen und veröffentlichen (genau ein Tag, kein latest)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ./panel
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/paperlaiss:${{ github.ref_name }}

      - name: Digest ins Log — wer es ernst meint, pinnt ihn
        run: echo "ghcr.io/${{ env.OWNER_LC }}/paperlaiss@${{ steps.build.outputs.digest }}"

      - name: Release anlegen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Panel-Abbild: \`ghcr.io/${OWNER_LC}/paperlaiss:${GITHUB_REF_NAME}\`

          Digest: \`${{ steps.build.outputs.digest }}\`

          Änderungen: siehe [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)"
